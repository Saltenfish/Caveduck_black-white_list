<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML 查詢對照表</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0c;--bg2:#111;--bg3:#171717;--bg4:#1d1d1d;
  --border:#222;--border2:#181818;
  --text:#ddd;--muted:#4a4a4a;--dim:#282828;
  --green:#3ec97a;--green-bg:#061410;--green-bd:#0d2818;
  --red:#e86050;--red-bg:#140806;--red-bd:#280f08;
  --blue:#4da8f0;--blue-bg:#060c18;--blue-bd:#0c1e38;
  --yellow:#f0c14d;--yellow-bg:#141008;--yellow-bd:#2a2008;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'SF Mono','Fira Code','Cascadia Code',ui-monospace,monospace;font-size:13px;line-height:1.6;display:flex;flex-direction:column;min-height:100vh}

/* ── MAIN HEADER ── */
.main-header{padding:.9rem 1.5rem .7rem;border-bottom:2px solid var(--border);background:linear-gradient(180deg,#101010,#0a0a0a);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.main-title{font-size:19px;font-weight:700;letter-spacing:.05em;color:var(--text);display:flex;align-items:center;gap:.55rem;line-height:1}
.main-title .accent{color:var(--green);font-size:15px}
.main-subtitle{font-size:10px;color:var(--muted);letter-spacing:.07em;line-height:1.5}

/* ── TOP TABS ── */
.top-bar{display:flex;border-bottom:2px solid var(--border);flex-shrink:0;background:var(--bg2)}
.top-tab{flex:1;padding:.65rem 1rem;border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:11px;cursor:pointer;letter-spacing:.06em;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:.4rem}
.top-tab .badge{font-size:9px;padding:1px 5px;border-radius:3px}
.top-tab.chat .badge{background:#061410;color:var(--green);border:1px solid #0d2818}
.top-tab.creator .badge{background:#060c18;color:var(--blue);border:1px solid #0c1e38}
.top-tab.preview .badge{background:#141008;color:var(--yellow);border:1px solid #2a2008}
.top-tab.chat.active{color:var(--green);border-bottom-color:var(--green);background:#040d08}
.top-tab.creator.active{color:var(--blue);border-bottom-color:var(--blue);background:#04080f}
.top-tab.preview.active{color:var(--yellow);border-bottom-color:var(--yellow);background:#0d0c04}
.top-tab:not(.active):hover{color:var(--text);background:var(--bg3)}

/* ── PAGES ── */
.page{display:none;flex:1;flex-direction:column;overflow:hidden}
.page.active{display:flex}

/* ── LEGEND + CONTENT TABS ── */
.legend-bar{padding:.35rem 1.5rem;font-size:10px;color:var(--muted);border-bottom:1px solid var(--border2);display:flex;gap:1.2rem;flex-wrap:wrap;flex-shrink:0;align-items:center}
.ldot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.ldot.g{background:var(--green)}.ldot.r{background:var(--red)}.ldot.b{background:var(--blue)}
.ct-bar{display:flex;gap:3px;padding:.5rem 1.5rem .35rem;border-bottom:1px solid var(--border2);flex-shrink:0}
.ct{padding:3px 12px;border-radius:4px;border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:11px;cursor:pointer;transition:all .15s;letter-spacing:.03em}
.ct:hover{color:var(--text)}.ct.active{background:var(--bg3);color:var(--text);border:1px solid var(--border)}

/* ── BODY ── */
.body-wrap{display:flex;flex:1;overflow:hidden;min-height:0}
.list-pane{flex:1;overflow-y:auto;min-width:0;padding:.9rem 1.5rem 2rem}

/* ── SEARCH / FILTER ── */
.search-row{display:flex;gap:.5rem;margin-bottom:.85rem;align-items:center;flex-wrap:wrap}
input[type=search]{flex:1;min-width:140px;background:#0a0a0a;border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:inherit;font-size:12px;padding:4px 9px;outline:none}
input[type=search]:focus{border-color:#333}
input[type=search]::placeholder{color:var(--dim)}
.ft-bar{display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:2px}
.ft{padding:2px 10px;border-radius:3px;border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:10px;cursor:pointer;transition:all .15s}
.ft:hover{color:var(--text)}.ft.active{background:var(--bg4);color:var(--text)}

/* ── STATS ── */
.stats{display:flex;gap:.5rem;margin-bottom:.9rem;flex-wrap:wrap}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:.25rem .7rem;display:flex;align-items:center;gap:.4rem}
.sn{font-size:13px;font-weight:600}.sl{font-size:10px;color:var(--muted)}
.sn.t{color:var(--text)}.sn.g{color:var(--green)}.sn.r{color:var(--red)}

/* ── NOTE BOX ── */
.note-box{font-size:10px;color:var(--muted);margin-bottom:.85rem;padding:.4rem .65rem;border-left:2px solid var(--border);line-height:1.8}

/* ── INTRO BOX (replaces note for category) ── */
.intro-box{margin-bottom:1rem;padding:.7rem .9rem;background:linear-gradient(180deg,#101418,#0c0e10);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:6px}
.intro-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:.35rem;letter-spacing:.03em}
.intro-desc{font-size:11px;color:#888;line-height:1.85}

/* ── TYPE DIVIDER (for "全部" tab) ── */
.type-divider{margin:1.4rem 0 .65rem;padding-top:.6rem;border-top:1px dashed var(--border)}
.type-divider:first-of-type{margin-top:.5rem;padding-top:0;border-top:none}
.type-divider-label{display:inline-block;font-size:11px;font-weight:600;color:var(--green);background:#06120c;padding:3px 10px;border-radius:4px;border:1px solid var(--green-bd);letter-spacing:.04em}

/* ── SECTIONS ── */
.section{margin-bottom:1.1rem}
.sec-title{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--dim);margin-bottom:.4rem;padding-bottom:.25rem;border-bottom:1px solid var(--border2)}
.tag-grid{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:11px;padding:2px 8px;border-radius:4px;font-family:inherit;cursor:default;transition:filter .1s,transform .1s}
.tag.g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.tag.r{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.tag.b{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.tag.clickable{cursor:pointer}
.tag.clickable:hover{filter:brightness(1.4);transform:translateY(-1px)}
.tag.active-tag{outline:2px solid currentColor;outline-offset:2px;filter:brightness(1.3)}

#no-result{color:var(--dim);font-size:12px;padding:1rem 0;display:none}

/* ── PREVIEW PAGE (NEW: scrollable all-in-one) ── */
#page-preview{flex:1;display:none;flex-direction:column;overflow:hidden}
#page-preview.active{display:flex}
.preview-page-header{padding:.7rem 1.25rem;background:linear-gradient(180deg,#101010,#0c0c0c);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1.2rem;flex-shrink:0;flex-wrap:wrap}
.preview-page-title{font-size:13px;font-weight:600;color:var(--yellow);letter-spacing:.04em}
.preview-page-legend{display:flex;gap:1rem;font-size:10px;color:var(--muted);align-items:center}
.ldot.y{background:var(--yellow)}
.preview-page-search{margin-left:auto;display:flex;gap:.5rem;align-items:center}
.preview-page-search input{background:#0a0a0a;border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:inherit;font-size:11px;padding:4px 10px;outline:none;width:200px}
.preview-page-search input:focus{border-color:#444}

.preview-scroll{flex:1;overflow-y:auto;padding:1rem 1.25rem 2rem}
.preview-section{margin-bottom:2rem}
.preview-section-header{display:flex;align-items:baseline;gap:.6rem;padding-bottom:.5rem;margin-bottom:1rem;border-bottom:2px solid var(--green-bd)}
.preview-section-header.denied{border-bottom-color:var(--red-bd)}
.psh-icon{font-size:16px;color:var(--green);font-weight:700}
.preview-section-header.denied .psh-icon{color:var(--red)}
.psh-title{font-size:14px;font-weight:600;color:var(--text);letter-spacing:.04em}
.psh-sub{font-size:10px;color:var(--muted);letter-spacing:.02em}

/* 2-column grid for allowed tags */
.preview-allowed-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.85rem}
@media (max-width:980px){.preview-allowed-grid{grid-template-columns:1fr}}

/* Tag detail card */
.tag-card{background:#0e0e0e;border:1px solid var(--border);border-radius:7px;padding:.85rem;display:flex;flex-direction:column;gap:.55rem;scroll-margin-top:1rem;transition:border-color .2s}
.tag-card.both{border-left:3px solid var(--green)}
.tag-card.chat-only{border-left:3px solid var(--yellow);background:linear-gradient(90deg,#15110608,transparent 30%)}
.tag-card.creator-only{border-left:3px solid var(--yellow);background:linear-gradient(90deg,#15110608,transparent 30%)}
.tag-card.flash{border-color:var(--yellow);box-shadow:0 0 0 2px rgba(240,193,77,0.25)}

.tc-head{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.tc-name{font-size:13px;font-weight:600;font-family:'SF Mono',monospace}
.tc-name.green{color:var(--green)}
.tc-name.yellow{color:var(--yellow)}
.tc-iface-pill{font-size:9px;padding:1px 6px;border-radius:3px;letter-spacing:.04em}
.tc-iface-pill.chat{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.tc-iface-pill.creator{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.tc-iface-pill.both{background:#0d2818;color:#5fd99a;border:1px solid #1a4828}
.tc-iface-pill.yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-bd)}
.tc-type{font-size:9px;color:var(--muted);background:var(--bg3);padding:1px 6px;border-radius:3px;border:1px solid var(--border);letter-spacing:.04em}

.tc-desc{font-size:11px;color:#aaa;line-height:1.7}
.tc-attrs{display:flex;flex-wrap:wrap;gap:3px;align-items:center}
.tc-attr-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-right:4px}
.attr-pill{font-size:9px;padding:1px 6px;border-radius:3px;background:var(--bg3);color:#9b9b9b;border:1px solid var(--border)}
.tc-uses{display:flex;flex-wrap:wrap;gap:3px;align-items:center}
.use-pill{font-size:9px;padding:1px 6px;border-radius:3px;background:#0d1f15;color:#7dba94;border:1px solid #1a3826}

/* preview + code side by side */
.tc-preview-row{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.3rem;align-items:start}
.tc-prev-block{background:#0a0a0a;border:1px solid var(--border);border-radius:5px;overflow:hidden;display:flex;flex-direction:column}
.tc-prev-label{font-size:9px;color:var(--muted);padding:4px 8px;background:#080808;border-bottom:1px solid var(--border);letter-spacing:.06em;display:flex;justify-content:space-between;align-items:center}
.tc-prev-iframe-wrap{background:#fff;overflow:hidden}
.tc-prev-iframe-wrap iframe{width:100%;border:none;display:block}
.tc-code-pre{padding:.5rem .65rem;font-size:9.5px;line-height:1.65;overflow:auto;color:#b8ccb8;font-family:inherit;white-space:pre;flex:1}
.tc-copy{font-size:8px;color:var(--muted);background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:1px 6px;cursor:pointer;letter-spacing:.04em}
.tc-copy:hover{color:var(--text)}
.tc-copy.copied{color:var(--green);border-color:var(--green-bd)}

/* denied grid */
.preview-denied-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem}
@media (max-width:980px){.preview-denied-grid{grid-template-columns:1fr}}
.denied-card{background:#0c0808;border:1px solid var(--red-bd);border-left:3px solid var(--red);border-radius:6px;padding:.55rem .75rem;scroll-margin-top:1rem;transition:border-color .2s}
.denied-card.flash{box-shadow:0 0 0 2px rgba(232,96,80,0.25)}
.denied-head{display:flex;align-items:center;gap:.4rem;margin-bottom:.25rem}
.denied-name{font-size:12px;font-weight:600;font-family:'SF Mono',monospace;color:var(--red)}
.denied-type{font-size:9px;color:var(--muted);background:var(--bg3);padding:1px 5px;border-radius:3px;border:1px solid var(--border)}
.denied-desc{font-size:10px;color:#888;line-height:1.7}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
</style>
</head>
<body>

<!-- ══ MAIN HEADER ══ -->
<div class="main-header">
  <div class="main-title"><span class="accent">&lt;/&gt;</span>HTML 查詢對照表</div>
  <div class="main-subtitle">CSS · HTML · SVG · MathML 屬性／標籤白名單比對</div>
</div>

<!-- ══ TOP NAVIGATION TABS ══ -->
<div class="top-bar">
  <button class="top-tab chat active" onclick="setTopTab('chat',this)">
    💬 聊天室 <span class="badge">DOMPurify</span>
  </button>
  <button class="top-tab creator" onclick="setTopTab('creator',this)">
    🎨 角色／創作者介面 <span class="badge">jsxss + FilterCSS</span>
  </button>
  <button class="top-tab preview" onclick="setTopTab('preview',this)" id="previewTopTab">
    🔍 實機預覽 <span class="badge" id="previewBadge">—</span>
  </button>
</div>

<!-- ══ CHAT PAGE ══ -->
<div class="page active" id="page-chat">
  <div class="legend-bar">
    <span><span class="ldot g"></span>允許</span>
    <span><span class="ldot r"></span>禁止</span>
    <span id="blue-legend-chat" style="display:none"><span class="ldot b"></span>svgFilters 額外允許</span>
    <span style="color:#333">・ 點擊綠色標籤 → 跳至實機預覽</span>
  </div>
  <div class="ct-bar" id="ct-bar-chat">
    <button class="ct active" onclick="setContent('all',this,'chat')">📚 全部</button>
    <button class="ct" onclick="setContent('css',this,'chat')">CSS 屬性</button>
    <button class="ct" onclick="setContent('html',this,'chat')">HTML 標籤</button>
    <button class="ct" onclick="setContent('svg',this,'chat')">SVG／屬性</button>
    <button class="ct" onclick="setContent('math',this,'chat')">MathML</button>
  </div>
  <div class="body-wrap">
    <div class="list-pane" id="list-chat">
      <div class="search-row">
        <input type="search" id="searchChat" placeholder="搜尋屬性或標籤…" oninput="onSearch(this.value,'chat')" />
        <div class="ft-bar">
          <button class="ft active" onclick="setFilter('all',this,'chat')">全部</button>
          <button class="ft" onclick="setFilter('allow',this,'chat')">允許</button>
          <button class="ft" onclick="setFilter('deny',this,'chat')">禁止</button>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><span class="sn t" id="chat-total">—</span><span class="sl">總計</span></div>
        <div class="stat"><span class="sn g" id="chat-allow">—</span><span class="sl">✓ 允許</span></div>
        <div class="stat"><span class="sn r" id="chat-deny">—</span><span class="sl">✗ 禁止</span></div>
      </div>
      <div id="container-chat"></div>
      <div id="no-result-chat" style="color:var(--dim);font-size:12px;padding:1rem 0;display:none">沒有符合的項目</div>
    </div>
  </div>
</div>

<!-- ══ CREATOR PAGE ══ -->
<div class="page" id="page-creator">
  <div class="legend-bar">
    <span><span class="ldot g"></span>允許</span>
    <span><span class="ldot r"></span>禁止</span>
    <span style="color:#333">・ 點擊綠色標籤 → 跳至實機預覽</span>
  </div>
  <div class="ct-bar" id="ct-bar-creator">
    <button class="ct active" onclick="setContent('all',this,'creator')">📚 全部</button>
    <button class="ct" onclick="setContent('css',this,'creator')">CSS 屬性</button>
    <button class="ct" onclick="setContent('html',this,'creator')">HTML 標籤</button>
    <button class="ct" onclick="setContent('svg',this,'creator')">SVG／屬性</button>
    <button class="ct" onclick="setContent('math',this,'creator')">MathML</button>
  </div>
  <div class="body-wrap">
    <div class="list-pane" id="list-creator">
      <div class="search-row">
        <input type="search" id="searchCreator" placeholder="搜尋屬性或標籤…" oninput="onSearch(this.value,'creator')" />
        <div class="ft-bar">
          <button class="ft active" onclick="setFilter('all',this,'creator')">全部</button>
          <button class="ft" onclick="setFilter('allow',this,'creator')">允許</button>
          <button class="ft" onclick="setFilter('deny',this,'creator')">禁止</button>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><span class="sn t" id="creator-total">—</span><span class="sl">總計</span></div>
        <div class="stat"><span class="sn g" id="creator-allow">—</span><span class="sl">✓ 允許</span></div>
        <div class="stat"><span class="sn r" id="creator-deny">—</span><span class="sl">✗ 禁止</span></div>
      </div>
      <div id="container-creator"></div>
      <div id="no-result-creator" style="color:var(--dim);font-size:12px;padding:1rem 0;display:none">沒有符合的項目</div>
    </div>
  </div>
</div>

<!-- ══ PREVIEW PAGE ══ -->
<div class="page" id="page-preview">
  <div class="preview-page-header">
    <div class="preview-page-title">🔍 實機預覽 — 全部 tag 一覽</div>
    <div class="preview-page-legend">
      <span><span class="ldot g"></span>兩介面皆可用</span>
      <span><span class="ldot y"></span>僅單一介面可用</span>
      <span><span class="ldot r"></span>兩介面皆禁止</span>
    </div>
    <div class="preview-page-search">
      <input type="search" id="preview-search" placeholder="搜尋 tag…" oninput="filterPreviewTags(this.value)">
    </div>
  </div>
  <div class="preview-scroll" id="preview-scroll">
    <!-- ALLOWED SECTION -->
    <div class="preview-section">
      <div class="preview-section-header">
        <span class="psh-icon">✓</span>
        <span class="psh-title">可用的 tag</span>
        <span class="psh-sub">含「兩介面皆可用」與「僅單一介面可用」（黃色標示）</span>
      </div>
      <div class="preview-allowed-grid" id="preview-allowed-grid"></div>
    </div>
    <!-- DENIED SECTION -->
    <div class="preview-section">
      <div class="preview-section-header denied">
        <span class="psh-icon">✗</span>
        <span class="psh-title">禁止的 tag</span>
        <span class="psh-sub">兩介面皆禁止 — 僅顯示簡易說明</span>
      </div>
      <div class="preview-denied-grid" id="preview-denied-grid"></div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
// KNOWLEDGE BASE
// ════════════════════════════════════════
const KB = {
'background-color':{desc:'設定元素的背景顏色。支援 hex、rgb、hsl、rgba、顏色關鍵字等格式。在聊天室和創作者介面都可使用，是最基礎的視覺裝飾屬性之一。',attrs:[],useCases:['強調區塊底色','卡片背景','文字 highlight'],
preview:`<div style="padding:16px;display:flex;gap:8px;flex-wrap:wrap;background:#f5f5f5"><span style="background-color:#ff6b6b;padding:8px 14px;border-radius:4px;color:#fff;font-family:sans-serif">紅色</span><span style="background-color:rgba(70,180,100,0.4);padding:8px 14px;border-radius:4px;font-family:sans-serif">半透明綠</span><span style="background-color:#1a1a2e;padding:8px 14px;border-radius:4px;color:#e0e0e0;font-family:sans-serif">深藍</span><span style="background-color:hsl(45,90%,60%);padding:8px 14px;border-radius:4px;font-family:sans-serif">HSL黃</span></div>`,
code:`<span style="background-color:#ff6b6b;color:#fff;padding:8px 16px;border-radius:4px">紅色背景</span>
<span style="background-color:rgba(70,180,100,0.4);padding:8px 16px;border-radius:4px">半透明綠色</span>

function setTopTab(tab, el) {
  document.querySelectorAll('.top-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  if (tab !== 'preview') {
    previousTopTab = tab;
    currentIface = tab;
  }
}

// JUMP TO PREVIEW PAGE ANCHOR
// ════════════════════════════════════════
function tagAnchorId(tag) {
  // Make safe DOM id (replace : and other illegal chars)
  return 'preview-tag-' + tag.replace(/[^a-zA-Z0-9_-]/g, '_');
}

function goToPreviewAnchor(tag) {
  previousTopTab = currentIface;
  // Switch to preview top tab
  document.querySelectorAll('.top-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.top-tab.preview').classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-preview').classList.add('active');
  // Scroll to anchor
  setTimeout(() => {
    const el = document.getElementById(tagAnchorId(tag));
    if (el) {
      el.scrollIntoView({behavior:'smooth', block:'start'});
      el.classList.add('flash');
      setTimeout(() => el.classList.remove('flash'), 1800);
    } else {
      // tag not found in preview page - just scroll to top
      const scroll = document.getElementById('preview-scroll');
      if (scroll) scroll.scrollTop = 0;
    }
  }, 60);
}

function getSimpleDesc(tag) {
  if (KB[tag]) return KB[tag].desc;
  if (SIMPLE_DESCS[tag]) return SIMPLE_DESCS[tag];
  // Pattern guesses
  if (/^h[1-6]$/.test(tag)) return tag.toUpperCase() + ' 標題層級。';
  if (/^animat/i.test(tag)) return tag + '：動畫類元素，通常被禁止。';
  if (/^font-/i.test(tag)) return tag + '：字型相關 SVG 屬性。';
  return '此 tag 為標籤白名單成員，可在此介面使用。';
}

// Determine availability for each tag (chat & creator)
function buildAvailabilityMap() {
  const map = new Map(); // tag -> {chatStatus, creatorStatus, type, attrs}
  ['chat', 'creator'].forEach(iface => {
    ['css', 'html', 'svg', 'math'].forEach(type => {
      const src = DATA[iface][type];
      if (!src) return;
      Object.entries(src.sections).forEach(([cat, lists]) => {
        const allow = [...(lists.allow || []), ...(lists.blue || [])];
        const deny = lists.deny || [];
        const allowAttrs = lists.allowWithAttrs || {};

        allow.forEach(t => {
          if (!map.has(t)) map.set(t, {chat:null, creator:null, type, attrs:[]});
          map.get(t)[iface] = 'allow';
          if (!map.get(t).type) map.get(t).type = type;
        });
        Object.entries(allowAttrs).forEach(([t, attrs]) => {
          if (!map.has(t)) map.set(t, {chat:null, creator:null, type, attrs:[]});
          map.get(t)[iface] = 'allow';
          if (!map.get(t).type) map.get(t).type = type;
          if (attrs.length) {
            const existing = map.get(t).attrs || [];
            map.get(t).attrs = Array.from(new Set([...existing, ...attrs]));
          }
        });
        deny.forEach(t => {
          if (!map.has(t)) map.set(t, {chat:null, creator:null, type, attrs:[]});
          if (!map.get(t)[iface]) map.get(t)[iface] = 'deny';
          if (!map.get(t).type) map.get(t).type = type;
        });
      });
    });
  });
  return map;
}

function buildPreviewPage() {
  const availability = buildAvailabilityMap();
  const allowedGrid = document.getElementById('preview-allowed-grid');
  const deniedGrid = document.getElementById('preview-denied-grid');
  allowedGrid.innerHTML = '';
  deniedGrid.innerHTML = '';

  // Sort: green(both)→yellow(partial)→red(denied), then css→html→svg→math, then alphabetical
  const typeOrder = {css:0, html:1, svg:2, math:3};
  const sorted = Array.from(availability.entries()).sort((a, b) => {
    const aChat = a[1].chat === 'allow', aCreator = a[1].creator === 'allow';
    const bChat = b[1].chat === 'allow', bCreator = b[1].creator === 'allow';
    const aColor = (aChat && aCreator) ? 0 : (aChat || aCreator) ? 1 : 2;
    const bColor = (bChat && bCreator) ? 0 : (bChat || bCreator) ? 1 : 2;
    if (aColor !== bColor) return aColor - bColor;
    const aType = typeOrder[a[1].type] ?? 4;
    const bType = typeOrder[b[1].type] ?? 4;
    if (aType !== bType) return aType - bType;
    return a[0].localeCompare(b[0]);
  });
  
  // Type label map
  const typeLabels = {css:'CSS', html:'HTML', svg:'SVG', math:'MathML'};

  let allowedCount = 0, deniedCount = 0;
  sorted.forEach(([tag, info]) => {
    const chatAllow = info.chat === 'allow';
    const creatorAllow = info.creator === 'allow';

    if (chatAllow || creatorAllow) {
      // Allowed (full card or simple card)
      const card = renderAllowedCard(tag, info, chatAllow, creatorAllow, typeLabels);
      allowedGrid.appendChild(card);
      allowedCount++;
    } else if (info.chat === 'deny' || info.creator === 'deny') {
      // Denied
      const card = renderDeniedCard(tag, info, typeLabels);
      deniedGrid.appendChild(card);
      deniedCount++;
    }
  });

  // Update preview tab badge with total count
  const badge = document.getElementById('previewBadge');
  if (badge) badge.textContent = (allowedCount + deniedCount) + ' 個';
}

function escapeHTML(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderAllowedCard(tag, info, chatAllow, creatorAllow, typeLabels) {
  const card = document.createElement('div');
  let availType = 'both';
  if (chatAllow && !creatorAllow) availType = 'chat-only';
  else if (!chatAllow && creatorAllow) availType = 'creator-only';
  card.className = 'tag-card ' + availType;
  card.id = tagAnchorId(tag);

  const kb = KB[tag];
  const desc = kb ? kb.desc : getSimpleDesc(tag);
  const attrs = (kb && kb.attrs && kb.attrs.length) ? kb.attrs : (info.attrs || []);
  const useCases = kb && kb.useCases ? kb.useCases : null;
  const hasPreview = kb && kb.preview && kb.code;

  const ifacePill = availType === 'both'
    ? ''
    : (availType === 'chat-only'
        ? '<span class="tc-iface-pill yellow">⚠ 僅聊天室可用</span>'
        : '<span class="tc-iface-pill yellow">⚠ 僅創作者介面可用</span>');

  const nameColor = (availType === 'both') ? 'var(--green)' : 'var(--yellow)';
  let html = '<div class="tc-head">'
    + '<span class="tc-name" style="color:' + nameColor + '">&lt;' + tag + '&gt;</span>'
    + '<span class="tc-type">' + typeLabels[info.type] + '</span>'
    + ifacePill
    + '</div>'
    + '<div class="tc-desc">' + desc + '</div>';

  if (attrs && attrs.length) {
    html += '<div class="tc-attrs"><span class="tc-attr-label">支援屬性</span>'
      + attrs.map(a => '<span class="attr-pill">' + a + '</span>').join('')
      + '</div>';
  }

  if (useCases && useCases.length) {
    html += '<div class="tc-uses"><span class="tc-attr-label">常見用途</span>'
      + useCases.map(u => '<span class="use-pill">' + u + '</span>').join('')
      + '</div>';
  }

  if (hasPreview) {
    const codeId = tagAnchorId(tag) + '-code';
    html += '<div class="tc-preview-row">'
      + '<div class="tc-prev-block">'
      +   '<div class="tc-prev-label">▶ 效果預覽</div>'
      +   '<div class="tc-prev-iframe-wrap" data-tag="' + tag + '"></div>'
      + '</div>'
      + '<div class="tc-prev-block">'
      +   '<div class="tc-prev-label">{ } 範例原碼 <button class="tc-copy" data-code-tag="' + tag + '" onclick="copyTagCode(this,\'' + tag + '\')">複製</button></div>'
      +   '<pre class="tc-code-pre">' + escapeHTML(kb.code) + '</pre>'
      + '</div>'
      + '</div>';
  }

  card.innerHTML = html;

  // Build iframe preview
  if (hasPreview) {
    const wrap = card.querySelector('.tc-prev-iframe-wrap');
    if (wrap) {
      const frame = document.createElement('iframe');
      frame.setAttribute('sandbox', 'allow-same-origin');
      frame.style.cssText = 'width:100%;border:none;display:block;background:#fff';
      const htmlContent = '<!DOCTYPE html><html><head><meta charset="UTF-8">'
        + '<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:sans-serif;font-size:13px;color:#333;width:100%}</style>'
        + '</head><body>' + kb.preview + '</body></html>';
      frame.srcdoc = htmlContent;
      wrap.appendChild(frame);

      let fitted = false;
      function fitFrame() {
        if (fitted) return;
        try {
          const body = frame.contentDocument && frame.contentDocument.body;
          if (!body) return;
          const h = body.scrollHeight;
          if (h > 0) {
            frame.style.height = h + 'px';
            fitted = true;
          }
        } catch(e) {}
      }
      frame.addEventListener('load', function() {
        requestAnimationFrame(function() {
          requestAnimationFrame(fitFrame);
        });
      });
      setTimeout(fitFrame, 350);
    }
  }

  return card;
}

function renderDeniedCard(tag, info, typeLabels) {
  const card = document.createElement('div');
  card.className = 'denied-card';
  card.id = tagAnchorId(tag);
  const desc = KB[tag] ? KB[tag].desc : getSimpleDesc(tag);
  card.innerHTML = '<div class="denied-head">'
    + '<span class="denied-name">&lt;' + tag + '&gt;</span>'
    + '<span class="denied-type">' + (typeLabels[info.type] || '') + '</span>'
    + '</div>'
    + '<div class="denied-desc">' + desc + '</div>';
  return card;
}

function copyTagCode(btn, tag) {
  const kb = KB[tag]; if (!kb) return;
  navigator.clipboard.writeText(kb.code).then(() => {
    btn.textContent = '✓ 已複製';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '複製'; btn.classList.remove('copied'); }, 1800);
  });
}

// ════════════════════════════════════════
// PREVIEW SEARCH FILTER
// ════════════════════════════════════════
function filterPreviewTags(query) {
  query = query.toLowerCase().trim();
  document.querySelectorAll('.tag-card, .denied-card').forEach(card => {
    const name = (card.querySelector('.tc-name, .denied-name')?.textContent || '').toLowerCase();
    if (!query || name.includes(query)) {
      card.style.display = '';
    } else {
      card.style.display = 'none';
    }
  });
}

// LIST RENDER
// ════════════════════════════════════════
function setContent(v, el, iface) {
  currentContent[iface] = v;
  const bar = document.getElementById('ct-bar-' + iface);
  bar.querySelectorAll('.ct').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render(iface);
}
function setFilter(v, el, iface) {
  currentFilter[iface] = v;
  const listEl = document.getElementById('list-' + iface);
  listEl.querySelectorAll('.ft').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render(iface);
}
function onSearch(v, iface) {
  currentQuery[iface] = v.toLowerCase();
  render(iface);
}

// Intro descriptions for each category
const CATEGORY_INTROS = {
  'all': {
    title: '📚 全部屬性 / 標籤總覽',
    desc: '一次查看此介面所有 CSS 屬性、HTML 標籤、SVG 元素、MathML 標籤的允許狀態。下方依「CSS → HTML → SVG → MathML」順序呈現，每組各自分類列出。'
  },
  'css': {
    title: '🎨 CSS 樣式屬性',
    desc: 'CSS（Cascading Style Sheets）控制元素「外觀」的樣式屬性，透過 inline style="…" 套用。涵蓋背景、邊框、盒模型、字型、文字排版等視覺裝飾。下方分類包括：背景（Background）、邊框（Border）、盒模型（Box，含寬高與內外距）、顏色（Color）、字型（Font）、文字（Text）、佈局（Flex/Grid）、動畫（Animation/Transform）等。注意：佈局與動畫類在創作者介面被嚴格禁止以防版面破壞。'
  },
  'html': {
    title: '📄 HTML 標籤元素',
    desc: 'HTML 標籤是網頁的「結構單位」，每個 tag 代表一種內容類型。下方分類包括：互動 / 表單元件（button、input、details 等，僅聊天室支援大部分）、多媒體（audio、video、img）、標準排版（h1~h6、p、div、span、a、ul 等）、表格（table 系列），以及禁止的危險標籤（script、iframe 等）。'
  },
  'svg': {
    title: '🎯 SVG 向量圖形',
    desc: 'SVG（Scalable Vector Graphics）是向量圖形的標記語言，可在 HTML 中嵌入精緻的圖示、插畫、資料視覺化。下方分類包括：HTML 通用屬性、SVG 核心元素（svg、circle、rect、path、text 等）、SVG Filter 濾鏡元素、SVG 屬性、XML/XLink 屬性。注意：SVG 在創作者介面完全禁止。'
  },
  'math': {
    title: '∑ MathML 數學公式',
    desc: 'MathML（Mathematical Markup Language）是專門呈現數學公式的標記語言。支援分數（mfrac）、上下標（msup/msub）、根號（msqrt）、矩陣（mtable）等數學符號。下方列出此介面支援的 MathML 標籤與屬性。注意：MathML 在創作者介面完全禁止。'
  }
};

function render(iface) {
  const content = currentContent[iface];
  const filter = currentFilter[iface];
  const query = currentQuery[iface];
  const container = document.getElementById('container-' + iface);
  const noResult = document.getElementById('no-result-' + iface);
  container.innerHTML = '';

  // Handle "all" tab - render css, html, svg, math sequentially
  if (content === 'all') {
    renderIntro(container, 'all');
    let totalA = 0, totalD = 0, totalB = 0, totalShown = 0;
    let hasAnyBlue = false;
    const seenTags = new Set();
    ['css', 'html', 'svg', 'math'].forEach(type => {
      const src = DATA[iface][type];
      if (!src) return;
      // Add type header
      const typeHeader = document.createElement('div');
      typeHeader.className = 'type-divider';
      const typeNames = {css:'🎨 CSS 屬性', html:'📄 HTML 標籤', svg:'🎯 SVG 向量圖', math:'∑ MathML 數學'};
      typeHeader.innerHTML = '<span class="type-divider-label">' + typeNames[type] + '</span>';
      container.appendChild(typeHeader);
      const result = renderSections(container, src, filter, query, iface, seenTags);
      totalA += result.aCount;
      totalD += result.dCount;
      totalB += result.bCount;
      totalShown += result.shown;
      if (result.hasBlue) hasAnyBlue = true;
    });
    const blLegend = document.getElementById('blue-legend-' + iface);
    if (blLegend) blLegend.style.display = hasAnyBlue ? 'inline' : 'none';
    noResult.style.display = totalShown === 0 ? 'block' : 'none';
    document.getElementById(iface + '-total').textContent = totalA + totalD + totalB;
    document.getElementById(iface + '-allow').textContent = totalB ? totalA + '+' + totalB : totalA;
    document.getElementById(iface + '-deny').textContent = totalD;
    return;
  }

  const src = DATA[iface][content];
  if (!src) return;

  // Render intro
  renderIntro(container, content);

  // Blue legend
  const hasBlue = Object.values(src.sections).some(s => s.blue && s.blue.length);
  const blLegend = document.getElementById('blue-legend-' + iface);
  if (blLegend) blLegend.style.display = hasBlue ? 'inline' : 'none';

  const result = renderSections(container, src, filter, query, iface);

  noResult.style.display = result.shown === 0 ? 'block' : 'none';
  document.getElementById(iface + '-total').textContent = result.aCount + result.dCount + result.bCount;
  document.getElementById(iface + '-allow').textContent = result.bCount ? result.aCount + '+' + result.bCount : result.aCount;
  document.getElementById(iface + '-deny').textContent = result.dCount;
}

function renderIntro(container, type) {
  const intro = CATEGORY_INTROS[type];
  if (!intro) return;
  const ib = document.createElement('div');
  ib.className = 'intro-box';
  ib.innerHTML = '<div class="intro-title">' + intro.title + '</div><p class="intro-desc">' + intro.desc + '</p>';
  container.appendChild(ib);
}

function renderSections(container, src, filter, query, iface, seenTags) {
  if (!seenTags) seenTags = new Set();
  let aCount = 0, dCount = 0, bCount = 0, shown = 0;
  const hasBlue = Object.values(src.sections).some(s => s.blue && s.blue.length);

  Object.entries(src.sections).forEach(([cat, lists]) => {
    let aItems = [], dItems = [], blItems = [], attrItems = [];
    if (lists.allow) aItems = lists.allow.filter(p => {
      if ((!query || p.includes(query)) && !seenTags.has(p)) { seenTags.add(p); return true; }
      return false;
    });
    if (lists.deny) dItems = lists.deny.filter(p => {
      if ((!query || p.includes(query)) && !seenTags.has(p)) { seenTags.add(p); return true; }
      return false;
    });
    if (lists.blue) blItems = lists.blue.filter(p => {
      if ((!query || p.includes(query)) && !seenTags.has(p)) { seenTags.add(p); return true; }
      return false;
    });
    if (lists.allowWithAttrs) {
      Object.entries(lists.allowWithAttrs).forEach(([tag, attrs]) => {
        if ((!query || tag.includes(query) || attrs.some(a => a.includes(query))) && !seenTags.has(tag)) {
          seenTags.add(tag);
          attrItems.push({tag, attrs});
        }
      });
    }
    const showA = filter !== 'deny' && (aItems.length || attrItems.length || blItems.length);
    const showD = filter !== 'allow' && dItems.length;
    if (!showA && !showD) return;
    shown++;
    aCount += aItems.length + attrItems.length;
    dCount += dItems.length;
    bCount += blItems.length;

    const sec = document.createElement('div');
    sec.className = 'section';
    const title = document.createElement('div');
    title.className = 'sec-title';
    title.textContent = cat;
    const grid = document.createElement('div');
    grid.className = 'tag-grid';
    sec.appendChild(title);
    sec.appendChild(grid);
    container.appendChild(sec);

    if (showA) {
      aItems.forEach(p => {
        const t = document.createElement('span');
        t.className = 'tag g clickable';
        t.textContent = p;
        t.onclick = () => goToPreviewAnchor(p);
        grid.appendChild(t);
        seenTags.add(p);
      });
      blItems.forEach(p => {
        const t = document.createElement('span');
        t.className = 'tag b clickable';
        t.textContent = p;
        t.onclick = () => goToPreviewAnchor(p);
        grid.appendChild(t);
        seenTags.add(p);
      });
      attrItems.forEach(({tag, attrs}) => {
        const t = document.createElement('span');
        t.className = 'tag g clickable';
        t.textContent = tag;
        if (attrs.length) t.title = '允許屬性: ' + attrs.join(', ');
        t.onclick = () => goToPreviewAnchor(tag);
        grid.appendChild(t);
        seenTags.add(tag);
      });
    }
    if (showD) {
      dItems.forEach(p => {
        const t = document.createElement('span');
        t.className = 'tag r clickable';
        t.textContent = p;
        t.onclick = () => goToPreviewAnchor(p);
        grid.appendChild(t);
        seenTags.add(p);
      });
    }
  });

  return {aCount, dCount, bCount, shown, hasBlue};
}
