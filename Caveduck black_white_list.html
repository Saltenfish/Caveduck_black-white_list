<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>介面權限對照表</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0c0c0c;
  --bg2: #141414;
  --bg3: #1a1a1a;
  --border: #242424;
  --border2: #1a1a1a;
  --text: #dedede;
  --muted: #505050;
  --dim: #303030;
  --green: #3ec97a;
  --green-bg: #071a0f;
  --green-bd: #0f2e1c;
  --red: #e86050;
  --red-bg: #180906;
  --red-bd: #2e1008;
  --yellow: #d4a843;
  --yellow-bg: #181004;
  --yellow-bd: #2e2008;
  --blue: #4da8f0;
  --blue-bg: #060f1c;
  --blue-bd: #0e2040;
  --chat-accent: #3ec97a;
  --creator-accent: #4da8f0;
}
body { background:var(--bg); color:var(--text); font-family:'SF Mono','Fira Code','Cascadia Code',monospace; font-size:13px; line-height:1.6; min-height:100vh; }

/* ── header ── */
.header { padding:1.5rem 1.75rem 1rem; border-bottom:1px solid var(--border); }
.header h1 { font-size:13px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--text); margin-bottom:.3rem; }
.header p { font-size:11px; color:var(--muted); }

/* ── interface switcher ── */
.if-bar { display:flex; gap:0; border-bottom:1px solid var(--border); }
.if-tab { flex:1; padding:.75rem 1rem; border:none; background:transparent; color:var(--muted); font-family:inherit; font-size:12px; cursor:pointer; letter-spacing:.04em; border-bottom:2px solid transparent; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:.5rem; }
.if-tab .badge { font-size:9px; padding:1px 6px; border-radius:3px; letter-spacing:.03em; }
.if-tab.chat .badge { background:#071a0f; color:var(--green); border:1px solid var(--green-bd); }
.if-tab.creator .badge { background:#060f1c; color:var(--blue); border:1px solid var(--blue-bd); }
.if-tab.chat.active { color:var(--green); border-bottom-color:var(--green); background:#060e09; }
.if-tab.creator.active { color:var(--blue); border-bottom-color:var(--blue); background:#060a12; }
.if-tab:not(.active):hover { color:var(--text); background:var(--bg2); }

/* ── info bar ── */
.info-bar { padding:.6rem 1.75rem; font-size:11px; color:var(--muted); border-bottom:1px solid var(--border2); display:flex; gap:1.5rem; flex-wrap:wrap; }
.info-bar span { display:flex; align-items:center; gap:.35rem; }
.info-dot { width:6px; height:6px; border-radius:50%; }
.info-dot.g { background:var(--green); }
.info-dot.r { background:var(--red); }
.info-dot.y { background:var(--yellow); }
.info-dot.b { background:var(--blue); }

/* ── content tab bar ── */
.content-tabs { display:flex; gap:4px; padding:.75rem 1.75rem .5rem; border-bottom:1px solid var(--border2); }
.ct { padding:4px 14px; border-radius:4px; border:none; background:transparent; color:var(--muted); font-family:inherit; font-size:11px; cursor:pointer; transition:all .15s; letter-spacing:.03em; }
.ct:hover { color:var(--text); }
.ct.active { background:var(--bg3); color:var(--text); border:1px solid var(--border); }

/* ── main ── */
.main { padding:1rem 1.75rem 2rem; }
.search-row { display:flex; gap:.5rem; margin-bottom:1rem; align-items:center; flex-wrap:wrap; }
input[type=search] { flex:1; min-width:180px; background:#0e0e0e; border:1px solid var(--border); border-radius:5px; color:var(--text); font-family:inherit; font-size:12px; padding:5px 10px; outline:none; }
input[type=search]:focus { border-color:#333; }
input[type=search]::placeholder { color:var(--dim); }
.filter-tabs { display:flex; gap:3px; background:var(--bg2); border:1px solid var(--border); border-radius:5px; padding:3px; }
.ft { padding:3px 11px; border-radius:3px; border:none; background:transparent; color:var(--muted); font-family:inherit; font-size:11px; cursor:pointer; transition:all .15s; }
.ft:hover { color:var(--text); }
.ft.active { background:var(--bg3); color:var(--text); }

/* ── stats ── */
.stats { display:flex; gap:.6rem; margin-bottom:1.25rem; flex-wrap:wrap; }
.stat { background:var(--bg2); border:1px solid var(--border); border-radius:5px; padding:.35rem .85rem; display:flex; align-items:center; gap:.5rem; }
.stat-n { font-size:14px; font-weight:600; }
.stat-l { font-size:10px; color:var(--muted); }
.stat-n.t { color:var(--text); }
.stat-n.g { color:var(--green); }
.stat-n.r { color:var(--red); }
.stat-n.y { color:var(--yellow); }

/* ── sections ── */
.section { margin-bottom:1.4rem; }
.section-title { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); margin-bottom:.5rem; padding-bottom:.3rem; border-bottom:1px solid var(--border2); }
.tag-grid { display:flex; flex-wrap:wrap; gap:5px; }
.tag { font-size:11px; padding:2px 9px; border-radius:4px; font-family:inherit; }
.tag.g  { background:var(--green-bg);  color:var(--green);  border:1px solid var(--green-bd);  }
.tag.r  { background:var(--red-bg);    color:var(--red);    border:1px solid var(--red-bd);    }
.tag.y  { background:var(--yellow-bg); color:var(--yellow); border:1px solid var(--yellow-bd); }
.tag.b  { background:var(--blue-bg);   color:var(--blue);   border:1px solid var(--blue-bd);   }
/* tag with allowed attrs tooltip */
.tag.has-attrs { cursor:default; position:relative; }
.tag.has-attrs::after { content:attr(data-attrs); position:absolute; left:0; top:calc(100% + 4px); background:#1e1e1e; border:1px solid var(--border); border-radius:4px; padding:4px 8px; font-size:10px; color:var(--muted); white-space:nowrap; z-index:10; display:none; pointer-events:none; max-width:300px; white-space:normal; line-height:1.5; }
.tag.has-attrs:hover::after { display:block; }

#no-result { color:var(--dim); font-size:12px; padding:1rem 0; display:none; }

/* ── note box ── */
.note { font-size:11px; color:var(--muted); margin-bottom:1rem; padding:.5rem .75rem; border-left:2px solid var(--border); line-height:1.8; }

/* ── CSS note about attr values ── */
.css-attr-note { font-size:10px; color:var(--dim); padding:.2rem 0 .8rem; }
</style>
</head>
<body>

<div class="header">
  <h1>介面權限對照表</h1>
  <p>聊天室 (DOMPurify · 模組 82931)　vs　角色/創作者主頁 (jsxss + FilterCSS · 模組 59528/12639/77153)</p>
</div>

<div class="if-bar">
  <button class="if-tab chat active" onclick="setIface('chat',this)">
    💬 聊天室介面
    <span class="badge">DOMPurify</span>
  </button>
  <button class="if-tab creator" onclick="setIface('creator',this)">
    🎨 角色 / 創作者主頁
    <span class="badge">jsxss + FilterCSS</span>
  </button>
</div>

<div class="info-bar" id="info-bar">
  <span><span class="info-dot g"></span>允許（白名單）</span>
  <span><span class="info-dot r"></span>禁止（黑名單）</span>
  <span id="yellow-legend" style="display:none"><span class="info-dot y"></span>允許，但值受限</span>
  <span id="blue-legend" style="display:none"><span class="info-dot b"></span>svgFilters 額外允許</span>
  <span id="attr-legend" style="display:none">　・　標籤可 hover 查看允許的屬性</span>
</div>

<div class="content-tabs">
  <button class="ct active" onclick="setContent('css',this)">CSS 屬性</button>
  <button class="ct" onclick="setContent('html',this)">HTML 標籤</button>
  <button class="ct" onclick="setContent('svg',this)">SVG / HTML 屬性</button>
  <button class="ct" onclick="setContent('math',this)">MathML</button>
</div>

<div class="main">
  <div class="search-row">
    <input type="search" id="searchInput" placeholder="搜尋..." oninput="onSearch(this.value)" />
    <div class="filter-tabs">
      <button class="ft active" onclick="setFilter('all',this)">全部</button>
      <button class="ft" onclick="setFilter('allow',this)">允許</button>
      <button class="ft" onclick="setFilter('deny',this)">禁止</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><span class="stat-n t" id="s-total">—</span><span class="stat-l">總計</span></div>
    <div class="stat"><span class="stat-n g" id="s-allow">—</span><span class="stat-l">✓ 允許</span></div>
    <div class="stat"><span class="stat-n r" id="s-deny">—</span><span class="stat-l">✗ 禁止</span></div>
  </div>

  <div id="container"></div>
  <div id="no-result">沒有符合的項目</div>
</div>

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let iface = 'chat', content = 'css', filter = 'all', query = '';

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render() {
  const c = document.getElementById('container');
  const nr = document.getElementById('no-result');
  c.innerHTML = '';

  const src = DATA[iface][content];
  document.getElementById('attr-note') && (document.getElementById('attr-note').remove());

  // note box
  if (src.note) {
    const nb = document.createElement('div');
    nb.className = 'note'; nb.id = 'attr-note'; nb.textContent = src.note;
    c.appendChild(nb);
  }

  // blue legend visibility
  const hasBlue = Object.values(src.sections).some(s => s.blue && s.blue.length);
  document.getElementById('blue-legend').style.display = hasBlue ? 'inline-flex' : 'none';
  const hasAttrHover = Object.values(src.sections).some(s => s.allowWithAttrs);
  document.getElementById('attr-legend').style.display = hasAttrHover ? 'inline' : 'none';

  let allowCount = 0, denyCount = 0, blueCount = 0, shown = 0;

  Object.entries(src.sections).forEach(([cat, lists]) => {
    // collect items
    let allowItems = [], denyItems = [], blueItems = [], attrItems = [];

    if (lists.allow)  allowItems = lists.allow.filter(p => !query || p.includes(query));
    if (lists.deny)   denyItems  = lists.deny.filter(p => !query || p.includes(query));
    if (lists.blue)   blueItems  = lists.blue.filter(p => !query || p.includes(query));
    if (lists.allowWithAttrs) {
      Object.entries(lists.allowWithAttrs).forEach(([tag, attrs]) => {
        if (!query || tag.includes(query) || attrs.some(a => a.includes(query))) {
          attrItems.push({ tag, attrs });
        }
      });
      allowItems = []; // attrs items replace allow
    }

    const showA  = filter !== 'deny'  && (allowItems.length > 0 || attrItems.length > 0 || blueItems.length > 0);
    const showD  = filter !== 'allow' && denyItems.length > 0;
    if (!showA && !showD) return;
    shown++;

    allowCount += allowItems.length + attrItems.length;
    denyCount  += denyItems.length;
    blueCount  += blueItems.length;

    const sec = document.createElement('div'); sec.className = 'section';
    const title = document.createElement('div'); title.className = 'section-title'; title.textContent = cat;
    const grid = document.createElement('div'); grid.className = 'tag-grid';
    sec.appendChild(title); sec.appendChild(grid); c.appendChild(sec);

    if (showA) {
      allowItems.forEach(p => { const t = document.createElement('span'); t.className='tag g'; t.textContent=p; grid.appendChild(t); });
      blueItems.forEach(p  => { const t = document.createElement('span'); t.className='tag b'; t.textContent=p; grid.appendChild(t); });
      attrItems.forEach(({ tag, attrs }) => {
        const t = document.createElement('span');
        t.className = attrs.length ? 'tag g has-attrs' : 'tag g';
        t.textContent = tag;
        if (attrs.length) t.setAttribute('data-attrs', '屬性: ' + attrs.join(', '));
        grid.appendChild(t);
      });
    }
    if (showD) {
      denyItems.forEach(p => { const t = document.createElement('span'); t.className='tag r'; t.textContent=p; grid.appendChild(t); });
    }
  });

  nr.style.display = shown === 0 ? 'block' : 'none';
  const total = allowCount + denyCount + blueCount;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-allow').textContent = blueCount ? allowCount + '+' + blueCount : allowCount;
  document.getElementById('s-deny').textContent  = denyCount;
}

// ─────────────────────────────────────────────
// EVENT HANDLERS
// ─────────────────────────────────────────────
function setIface(v, el) {
  iface = v;
  document.querySelectorAll('.if-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}
function setContent(v, el) {
  content = v;
  document.querySelectorAll('.ct').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}
function setFilter(v, el) {
  filter = v;
  document.querySelectorAll('.ft').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}
function onSearch(v) {
  query = v.toLowerCase();
  render();
}

render();
</script>
